services:
  postgres:
    image: postgres:18.3-alpine
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    container_name: pg_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: recallx_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql

  qdrant:
    image: qdrant/qdrant
    restart: always
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:2026.04.0-community-trixie
    container_name: neo4j_db
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:8.6.2-alpine
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    container_name: redis_db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  recallx:
    build: .
    container_name: recallx_app
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
  qdrant_data:
  neo4j_data:
  redis_data:
